<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:30px;
}

.container{
    background:white;
    width:700px;
    max-width:100%;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.task-form{
    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:20px;
}

.task-form input,
.task-form button{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.task-form button{
    background:#4caf50;
    color:white;
    border:none;
    cursor:pointer;
}

.task-form button:hover{
    background:#43a047;
}

.task-list{
    list-style:none;
}

.task{
    background:#f5f5f5;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.task-info{
    flex:1;
}

.task.completed .task-title{
    text-decoration:line-through;
    color:gray;
}

.task-date{
    color:#666;
    font-size:0.9rem;
    margin-top:5px;
}

.actions{
    display:flex;
    gap:8px;
}

.actions button{
    border:none;
    padding:8px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.complete{
    background:#4caf50;
}

.edit{
    background:#2196f3;
}

.delete{
    background:#f44336;
}

@media(max-width:768px){

.task-form{
    grid-template-columns:1fr;
}

.task{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
}

.actions{
    width:100%;
}
}
</style>
</head>
<body>

<div class="container">

    <h1>📝 To-Do List Manager</h1>

    <div class="task-form">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter task">

        <input
            type="date"
            id="taskDate">

        <input
            type="time"
            id="taskTime">

        <button onclick="addTask()">
            Add
        </button>
    </div>

    <ul id="taskList" class="task-list"></ul>

</div>

<script>

let tasks = JSON.parse(
    localStorage.getItem("tasks")
) || [];

function saveTasks(){
    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

function renderTasks(){

    const taskList =
        document.getElementById("taskList");

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        const li =
            document.createElement("li");

        li.className =
            task.completed
            ? "task completed"
            : "task";

        li.innerHTML = `
            <div class="task-info">
                <div class="task-title">
                    ${task.title}
                </div>

                <div class="task-date">
                    📅 ${task.date || "No Date"}
                    ⏰ ${task.time || ""}
                </div>
            </div>

            <div class="actions">

                <button
                    class="complete"
                    onclick="toggleTask(${index})">
                    ${
                        task.completed
                        ? "Undo"
                        : "Done"
                    }
                </button>

                <button
                    class="edit"
                    onclick="editTask(${index})">
                    Edit
                </button>

                <button
                    class="delete"
                    onclick="deleteTask(${index})">
                    Delete
                </button>

            </div>
        `;

        taskList.appendChild(li);
    });

    saveTasks();
}

function addTask(){

    const title =
        document.getElementById("taskInput")
        .value.trim();

    const date =
        document.getElementById("taskDate")
        .value;

    const time =
        document.getElementById("taskTime")
        .value;

    if(title === ""){
        alert("Please enter a task.");
        return;
    }

    tasks.push({
        title,
        date,
        time,
        completed:false
    });

    document.getElementById("taskInput").value="";
    document.getElementById("taskDate").value="";
    document.getElementById("taskTime").value="";

    renderTasks();
}

function toggleTask(index){

    tasks[index].completed =
        !tasks[index].completed;

    renderTasks();
}

function deleteTask(index){

    if(confirm("Delete this task?")){

        tasks.splice(index,1);

        renderTasks();
    }
}

function editTask(index){

    const task = tasks[index];

    const newTitle =
        prompt(
            "Edit Task:",
            task.title
        );

    if(newTitle === null) return;

    const newDate =
        prompt(
            "Edit Date (YYYY-MM-DD):",
            task.date
        );

    const newTime =
        prompt(
            "Edit Time (HH:MM):",
            task.time
        );

    tasks[index] = {
        ...task,
        title:newTitle,
        date:newDate,
        time:newTime
    };

    renderTasks();
}

renderTasks();

</script>

</body>
</html>
